<h2>Forgot Password</h2>
<input type="email" id="forgotEmail" placeholder="Your admin email"><br>
<button id="sendResetBtn">Send Reset Link</button>
<p id="forgotMsg" style="color:red;"></p>

<script>
document.getElementById('sendResetBtn').onclick = async ()=>{
  const email = document.getElementById('forgotEmail').value.trim();
  if(!email) {document.getElementById('forgotMsg').textContent='Email required'; return;}
  const res = await fetch('/api/forgot-password',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email})
  });
  const data = await res.json();
  document.getElementById('forgotMsg').textContent = data.message || data.error;
};
</script>
