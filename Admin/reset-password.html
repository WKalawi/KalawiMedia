<h2>Reset Password</h2>
<input type="password" id="newPwd" placeholder="New Password"><br>
<button id="resetBtn">Reset Password</button>
<p id="resetMsg" style="color:red;"></p>

<script>
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
document.getElementById('resetBtn').onclick = async ()=>{
  const newPassword = document.getElementById('newPwd').value.trim();
  if(!newPassword) { document.getElementById('resetMsg').textContent='Enter password'; return;}
  const res = await fetch('/api/reset-password',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({token,newPassword})
  });
  const data = await res.json();
  document.getElementById('resetMsg').textContent = data.success?'Password reset successfully':data.error;
};
</script>
